
<h2 class="sr-only">Wapi project feature roadmap — interactive plan organized by category and priority</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1.25rem 0}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.pill{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.pill.active{border-color:transparent;color:#fff;font-weight:500}
.pill[data-f="lang"].active{background:#534AB7}
.pill[data-f="api"].active{background:#0F6E56}
.pill[data-f="cli"].active{background:#BA7517}
.pill[data-f="ide"].active{background:#993C1D}
.pill[data-f="infra"].active{background:#3C3489}
.pill[data-f="all"].active{background:var(--color-text-primary)}
.section{margin-bottom:1.5rem}
.section-head{font-size:13px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.03em;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;white-space:nowrap;margin-left:auto;flex-shrink:0}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.card-sub{font-size:12px;color:var(--color-text-secondary);line-height:1.4}
.icon{font-size:16px;margin-top:1px;flex-shrink:0}
.hidden{display:none}
/* color themes per category */
.cat-lang .dot{background:#7F77DD}
.cat-lang .badge{background:#EEEDFE;color:#3C3489}
.cat-api .dot{background:#1D9E75}
.cat-api .badge{background:#E1F5EE;color:#085041}
.cat-cli .dot{background:#EF9F27}
.cat-cli .badge{background:#FAEEDA;color:#633806}
.cat-ide .dot{background:#D85A30}
.cat-ide .badge{background:#FAECE7;color:#4A1B0C}
.cat-infra .dot{background:#534AB7}
.cat-infra .badge{background:#EEEDFE;color:#26215C}
.tier-high{font-size:10px;font-weight:500;color:#639922;background:#EAF3DE;padding:2px 7px;border-radius:10px}
.tier-mid{font-size:10px;font-weight:500;color:#BA7517;background:#FAEEDA;padding:2px 7px;border-radius:10px}
.tier-low{font-size:10px;font-weight:500;color:#5F5E5A;background:#F1EFE8;padding:2px 7px;border-radius:10px}
</style>
<div class="wrap">
<div class="filters">
  <button class="pill active" data-f="all" onclick="filter('all')">All ideas</button>
  <button class="pill" data-f="lang" onclick="filter('lang')">Language</button>
  <button class="pill" data-f="api" onclick="filter('api')">WinAPI bindings</button>
  <button class="pill" data-f="cli" onclick="filter('cli')">CLI</button>
  <button class="pill" data-f="ide" onclick="filter('ide')">IDE</button>
  <button class="pill" data-f="infra" onclick="filter('infra')">Infrastructure</button>
</div>
<div id="sections"></div>
</div>
<script>
const data=[
  {cat:'lang',label:'Language',items:[
    {title:'break / continue',sub:'Exit or skip iterations in while loops',tier:'high',icon:'ti-arrows-transfer-up'},
    {title:'Logical operators',sub:'&&, ||, and ! for compound conditions',tier:'high',icon:'ti-logic-and'},
    {title:'Modulo operator',sub:'% and/or mod() for remainder arithmetic',tier:'high',icon:'ti-math-function'},
    {title:'User-defined functions',sub:'func keyword with arguments and return',tier:'high',icon:'ti-code-dots'},
    {title:'for loop / range',sub:'for i in range(n) or C-style for',tier:'high',icon:'ti-repeat'},
    {title:'Bitwise operators',sub:'&, |, ^, ~, <<, >> — handy for addresses',tier:'mid',icon:'ti-binary'},
    {title:'Arrays / lists',sub:'int[] pids = []; push, pop, index access',tier:'mid',icon:'ti-list'},
    {title:'String functions',sub:'len, substr, contains, replace, toLower, toInt',tier:'mid',icon:'ti-abc'},
    {title:'Math functions',sub:'abs, min, max built-in, possibly float type',tier:'mid',icon:'ti-math'},
    {title:'Error handling',sub:'try/catch or on_error for graceful failures',tier:'low',icon:'ti-alert-triangle'},
    {title:'Typed return values',sub:'Explicit return types on user functions',tier:'low',icon:'ti-arrow-back'},
    {title:'String interpolation',sub:'Embed vars inline: "pid is ${pid}"',tier:'low',icon:'ti-typography'},
  ]},
  {cat:'api',label:'WinAPI bindings',items:[
    {title:'sleep(ms)',sub:'Pause execution — essential for polling loops',tier:'high',icon:'ti-clock-pause'},
    {title:'timestamp()',sub:'Return current Unix ms or ISO-8601 string',tier:'high',icon:'ti-clock'},
    {title:'Thread management',sub:'listThreads, openThread, suspend/resumeThread',tier:'high',icon:'ti-cpu'},
    {title:'queryMemory / protectMemory',sub:'VirtualQueryEx + VirtualProtectEx wrappers',tier:'high',icon:'ti-lock'},
    {title:'getEnv / setEnv',sub:'Read and write environment variables',tier:'high',icon:'ti-variable'},
    {title:'scanPattern',sub:'AOB pattern scan across memory region',tier:'mid',icon:'ti-scan'},
    {title:'Registry R/W',sub:'regRead, regWrite, regDelete for HKEY paths',tier:'mid',icon:'ti-database'},
    {title:'File system ops',sub:'readFile, writeFile, fileExists, listDir',tier:'mid',icon:'ti-file'},
    {title:'createRemoteThread',sub:'Spawn thread in remote process at address',tier:'mid',icon:'ti-player-play'},
    {title:'listConnections',sub:'Active TCP/UDP connections via IP Helper',tier:'mid',icon:'ti-network'},
    {title:'Service management',sub:'listServices, startService, stopService',tier:'mid',icon:'ti-server'},
    {title:'Clipboard ops',sub:'getClipboard / setClipboard wrappers',tier:'low',icon:'ti-clipboard'},
    {title:'Privilege helpers',sub:'getTokenPrivileges, enablePrivilege(name)',tier:'low',icon:'ti-shield'},
    {title:'Named pipes',sub:'createPipe, connectPipe, readPipe, writePipe',tier:'low',icon:'ti-plug'},
    {title:'getProcAddress',sub:'Resolve exported function address in a module',tier:'low',icon:'ti-map-pin'},
  ]},
  {cat:'cli',label:'CLI',items:[
    {title:'Script file input',sub:'wapi run script.wapi instead of inline string',tier:'high',icon:'ti-file-code'},
    {title:'Line/column errors',sub:'Show error position in source, not just message',tier:'high',icon:'ti-map-2'},
    {title:'REPL mode',sub:'wapi repl — interactive read-eval-print loop',tier:'mid',icon:'ti-terminal-2'},
    {title:'JSON output mode',sub:'--output json for machine-readable results',tier:'mid',icon:'ti-braces'},
    {title:'wapi help <fn>',sub:'Built-in per-function reference from CLI',tier:'mid',icon:'ti-help'},
    {title:'Import / include',sub:'include "helpers.wapi" for script reuse',tier:'low',icon:'ti-package-import'},
    {title:'wapi fmt',sub:'Opinionated formatter for .wapi source files',tier:'low',icon:'ti-align-justified'},
  ]},
  {cat:'ide',label:'IDE',items:[
    {title:'.wapi language in Monaco',sub:'Syntax highlighting + autocomplete for all builtins',tier:'high',icon:'ti-code'},
    {title:'Inline diagnostics',sub:'Parse/runtime errors underlined in editor',tier:'high',icon:'ti-exclamation-mark'},
    {title:'Process explorer panel',sub:'Live process list in sidebar — click to inject PID',tier:'high',icon:'ti-list-search'},
    {title:'Execution history',sub:'Previous run/check outputs accessible via sidebar',tier:'mid',icon:'ti-history'},
    {title:'Script templates',sub:'Starter snippets for common WinAPI patterns',tier:'mid',icon:'ti-template'},
    {title:'Settings panel',sub:'Default mode, capabilities, theme, keybinds',tier:'mid',icon:'ti-settings'},
    {title:'Search across files',sub:'Global search inside a project\'s .wapi files',tier:'mid',icon:'ti-search'},
    {title:'Variable watch panel',sub:'Live variable state during a run — basic debugger',tier:'low',icon:'ti-eye'},
    {title:'Audit log viewer',sub:'Parse and highlight [WAPI_AUDIT] lines in output',tier:'low',icon:'ti-clipboard-list'},
  ]},
  {cat:'infra',label:'Infrastructure',items:[
    {title:'GitHub Actions CI',sub:'Auto-build C++ and Tauri on push/PR',tier:'high',icon:'ti-git-branch'},
    {title:'Lexer/parser unit tests',sub:'C++ test harness — catch regressions early',tier:'high',icon:'ti-test-pipe'},
    {title:'Evaluator unit tests',sub:'Mock WinAPI handles for safe offline testing',tier:'mid',icon:'ti-test-pipe-2'},
    {title:'CMake / vcpkg build',sub:'Replace .vcxproj with portable CMake setup',tier:'mid',icon:'ti-package'},
    {title:'Docs site',sub:'GitHub Pages with language reference + examples',tier:'mid',icon:'ti-book'},
    {title:'Versioned releases',sub:'GitHub releases with .msi + standalone .exe',tier:'low',icon:'ti-tag'},
  ]},
];

const tierLabel={high:'Quick win',mid:'Medium effort',low:'Longer term'};
function renderAll(filter){
  const el=document.getElementById('sections');
  el.innerHTML='';
  for(const sec of data){
    const items=filter==='all'?sec.items:(filter===sec.cat?sec.items:[]);
    if(!items.length)continue;
    const div=document.createElement('div');
    div.className=`section cat-${sec.cat}`;
    div.innerHTML=`<div class="section-head"><span class="dot"></span>${sec.label}</div><div class="cards"></div>`;
    const grid=div.querySelector('.cards');
    for(const it of items){
      const c=document.createElement('div');
      c.className='card';
      c.onclick=()=>sendPrompt(`Tell me more about adding "${it.title}" to the Wapi project`);
      c.innerHTML=`<div class="card-top"><i class="ti ${it.icon} icon" aria-hidden="true"></i><span class="card-title">${it.title}</span><span class="badge ${it.tier==='high'?'tier-high':it.tier==='mid'?'tier-mid':'tier-low'}">${tierLabel[it.tier]}</span></div><div class="card-sub">${it.sub}</div>`;
      grid.appendChild(c);
    }
    el.appendChild(div);
  }
}
function filter(f){
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.f===f));
  renderAll(f);
}
renderAll('all');
</script>
