
<h2 class="sr-only">Wapi full task checklist — filter by category and status across all 200+ planned items</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);padding:1rem 0}
.top{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border-strong);cursor:pointer;background:var(--surface-2);color:var(--text-secondary);font-weight:400;transition:all .12s}
.pill.on{color:#fff;border-color:transparent;font-weight:500}
.pill[data-c="lang"].on{background:#534AB7}
.pill[data-c="cli"].on{background:#0F6E56}
.pill[data-c="ide"].on{background:#BA7517}
.pill[data-c="api"].on{background:#993C1D}
.pill[data-c="infra"].on{background:#185FA5}
.pill[data-c="all"].on{background:var(--text-primary)}
.sfilter{display:flex;gap:4px}
.sf{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:var(--surface-2);color:var(--text-muted)}
.sf.on{background:var(--text-primary);color:#fff;border-color:transparent}
.divider{width:0.5px;background:var(--border);margin:0 4px;align-self:stretch}
.count{font-size:12px;color:var(--text-muted);margin-left:auto}
.cats{display:flex;flex-direction:column;gap:1.2rem}
.cat-head{display:flex;align-items:center;gap:8px;margin-bottom:.4rem}
.cat-label{font-size:11px;font-weight:500;color:var(--text-secondary);letter-spacing:.06em}
.bar{flex:1;height:3px;border-radius:2px;background:var(--border);overflow:hidden}
.barfill{height:100%;border-radius:2px}
.pct{font-size:11px;color:var(--text-muted)}
.items{display:flex;flex-direction:column;gap:2px}
.row{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface-2)}
.row.new-todo{border-style:dashed}
.row.done{opacity:1}
.row.partial{opacity:.85}
.row.todo,.row.new-todo{opacity:.7}
.chk{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;margin-top:1px}
.chk.done{background:#EAF3DE;color:#3B6D11}
.chk.partial{background:#FAEEDA;color:#633806}
.chk.todo{background:var(--surface-1);border:0.5px solid var(--border-strong);color:var(--text-muted)}
.chk.new-todo{background:var(--surface-1);border:0.5px dashed var(--border-strong);color:var(--text-muted)}
.rn{font-size:12px;font-weight:500;color:var(--text-primary);flex:1;line-height:1.3}
.rd{font-size:11px;color:var(--text-muted);text-align:right;flex-shrink:0;max-width:200px}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;background:#EEEDFE;color:#3C3489;margin-left:4px;flex-shrink:0}
.empty{font-size:13px;color:var(--text-muted);padding:1rem 0;text-align:center}
</style>

let activeCat="all", activeStatus="all";

function render(){
  const filtered=D.filter(r=>{
    const catOk=activeCat==="all"||r[0]===activeCat;
    const sOk=activeStatus==="all"||(activeStatus==="done"&&r[1]==="done")||(activeStatus==="partial"&&r[1]==="partial")||(activeStatus==="todo"&&(r[1]==="todo"||r[1]==="new-todo"));
    return catOk&&sOk;
  });
  document.getElementById("cnt").textContent=filtered.length+" tasks";

  const byCat={};
  for(const r of filtered){
    if(!byCat[r[0]])byCat[r[0]]=[];
    byCat[r[0]].push(r);
  }

  const out=document.getElementById("out");
  out.innerHTML="";
  if(!filtered.length){out.innerHTML='<div class="empty">No tasks match this filter.</div>';return;}

  const order=["lang","cli","ide","api","infra"];
  for(const cid of order){
    if(!byCat[cid])continue;
    const cat=CATS.find(c=>c.id===cid);
    const all=D.filter(r=>r[0]===cid);
    const done=all.filter(r=>r[1]==="done").length;
    const partial=all.filter(r=>r[1]==="partial").length;
    const pct=Math.round((done+partial*0.5)/all.length*100);
    const div=document.createElement("div");
    div.innerHTML=`<div class="cat-head">
      <span class="cat-label">${cat.label.toUpperCase()}</span>
      <div class="bar"><div class="barfill" style="width:${pct}%;background:${cat.color}"></div></div>
      <span class="pct">${done}/${all.length}</span>
    </div><div class="items" id="items-${cid}"></div>`;
    out.appendChild(div);
    const list=document.getElementById("items-"+cid);
    for(const r of byCat[cid]){
      const row=document.createElement("div");
      row.className="row "+r[1];
      const isNew=r[1]==="new-todo";
      row.innerHTML=`<span class="chk ${r[1]}">${r[1]==="done"?"✓":r[1]==="partial"?"~":""}</span><span class="rn">${r[2]}${isNew?'<span class="badge">new</span>':""}</span><span class="rd">${r[3]}</span>`;
      list.appendChild(row);
    }
  }
}

function buildPills(){
  const cp=document.getElementById("cpills");
  [["all","All"],["lang","Language"],["cli","CLI"],["ide","IDE"],["api","WinAPI"],["infra","Infrastructure"]].forEach(([id,label])=>{
    const b=document.createElement("button");
    b.className="pill"+(id==="all"?" on":"");
    b.dataset.c=id;
    b.textContent=label;
    b.onclick=()=>{activeCat=id;cp.querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.c===id));render()};
    cp.appendChild(b);
  });
  const sp=document.getElementById("spills");
  [["all","All"],["done","Done"],["partial","Partial"],["todo","To do"]].forEach(([id,label])=>{
    const b=document.createElement("button");
    b.className="sf"+(id==="all"?" on":"");
    b.dataset.s=id;
    b.textContent=label;
    b.onclick=()=>{activeStatus=id;sp.querySelectorAll(".sf").forEach(p=>p.classList.toggle("on",p.dataset.s===id));render()};
    sp.appendChild(b);
  });
}

buildPills();
render();
